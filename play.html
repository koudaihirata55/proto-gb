<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Play PROTO</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>
        <h1>PROTO</h1>
    </header>

    <main>

        <h2>ゲーム画面</h2>

        <div id="game"></div>

        <p>
            <a href="index.html">← タイトルへ戻る</a>
        </p>

    </main>

    <!-- EmulatorJS 設定 -->
    <script>

        window.EJS_player = "#game";

        window.EJS_core = "gb";

        window.EJS_gameName = "PROTO";

        window.EJS_gameUrl = "roms/proto.gb";

        window.EJS_pathtodata = "emulatorjs/data/";

        window.EJS_startOnLoaded = true;

        window.EJS_disableDatabases = true;

    </script>

    <!-- EmulatorJS 読み込み -->
    <script src="emulatorjs/data/loader.js"></script>

</body>

</html>
